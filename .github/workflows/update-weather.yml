name: Update weather cache

on:
  schedule:
    - cron: "0 * * * *"   # 毎時0分（UTC）
  workflow_dispatch:      # 手動実行ボタン

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch weather and write data/weather.json
        run: node scripts/fetch-weather-hourly.js
        env:
          TZ: Asia/Tokyo

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weather.json
          if git diff --staged --quiet; then
            echo "No changes to weather cache."
          else
            git commit -m "chore: update weather cache [automated]"
            git push
          fi
